<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- JK Shopping Bag Icon Centered -->
  <g transform="translate(7, 15)">
    <!-- Bag Handle -->
    <path d="M 28 18 C 28 -2, 58 -2, 58 18" fill="none" stroke="#e60000" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Handle attachments -->
    <circle cx="28" cy="18" r="4.5" fill="#e60000"/>
    <circle cx="58" cy="18" r="4.5" fill="#e60000"/>

    <!-- Top Rim of the Bag -->
    <rect x="0" y="18" width="86" height="10" fill="#e60000" rx="2"/>

    <!-- 'J' shape -->
    <path d="M 28 28 L 28 56 C 28 72, 6 72, 6 56" fill="none" stroke="#e60000" stroke-width="12" stroke-linecap="butt"/>

    <!-- 'K' shape -->
    <!-- Vertical stem -->
    <path d="M 48 28 L 48 72" fill="none" stroke="#e60000" stroke-width="12" stroke-linecap="butt"/>
    <!-- Top arm -->
    <path d="M 48 54 L 70 28" fill="none" stroke="#e60000" stroke-width="12" stroke-linecap="butt"/>
    <!-- Bottom arm -->
    <path d="M 56 45 L 76 72" fill="none" stroke="#e60000" stroke-width="12" stroke-linecap="butt"/>
  </g>
</svg>
