<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog & Videos — Jinis Kini</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: var(--radius) var(--radius) 0 0;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <svg width="180" height="45" viewBox="0 0 180 45" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="180" height="45" rx="8" fill="url(#logo-grad)"/>
                    <text x="16" y="30" font-family="Inter" font-weight="800" font-size="20" fill="white">Jinis Kini</text>
                    <text x="116" y="16" font-family="Inter" font-weight="600" font-size="7" fill="#a78bfa">PREMIUM</text>
                    <text x="116" y="30" font-family="Inter" font-weight="400" font-size="9" fill="#94a3b8">SUBSCRIPTIONS</text>
                    <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient></defs>
                </svg>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="blog.html" class="active">Blog & Videos</a>
                <a href="support.html">Help & Support</a>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
                <!-- Language Button Updated -->
                <button class="lang-toggle" id="langBtn" onclick="toggleLanguage()">EN</button>
                <a href="login.html" class="btn-login"><i class="fas fa-user"></i> Login</a>
                <div class="hamburger" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></div>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <div class="breadcrumb">
                <a href="index.html">Home</a>
                <i class="fas fa-chevron-right"></i>
                <span class="current">Blog & Videos</span>
            </div>
            <h1>Blog & Videos</h1>
            <p>Watch our latest guides, tutorials, and updates</p>
        </div>
    </section>

    <section class="featured-products" style="padding-top:40px;">
        <div class="container">
            <div class="filter-bar" id="blogFilter" style="justify-content:flex-start;">
                <!-- Filter buttons will be generated dynamically -->
                <button class="filter-btn active" onclick="filterBlog('all')">All Videos & Posts</button>
            </div>

            <div id="blogGrid" class="blog-grid">
                <!-- Loading State -->
                <div style="text-align:center; padding:40px; grid-column:1/-1;">
                    <i class="fas fa-spinner fa-spin" style="font-size:32px; color:var(--accent-primary);"></i>
                    <p style="margin-top:12px; color:var(--text-secondary);">Loading content from Google Sheet...</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="border-top:none; padding-top:40px;">
                <p class="copyright">&copy; 2026 Jinis Kini. All rights reserved</p>
            </div>
        </div>
    </footer>

    <button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Google Translate Element (Hidden) -->
    <div id="google_translate_element" style="display:none;"></div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en', 
                includedLanguages: 'en,bn', 
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        // ═══════ YOUR GOOGLE SHEET API URL FOR BLOGS ═══════
        const BLOG_SHEET_API = 'https://sheetdb.io/api/v1/yiauoepfjnnog';

        let blogPosts = [];
        let blogCategories = new Set();

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.querySelector('.theme-toggle i');
            icon.classList.toggle('fa-moon'); icon.classList.toggle('fa-sun');
        }
        function toggleMobileMenu() {
            document.querySelector('.nav-links').classList.toggle('open');
            document.querySelector('.nav-right').classList.toggle('open');
        }
        window.addEventListener('scroll', () => {
            document.getElementById('backToTop').style.display = window.scrollY > 300 ? 'flex' : 'none';
        });

        // ── Translation Toggle Logic ──
        let isBangla = false;
        function toggleLanguage() {
            let selectField = document.querySelector(".goog-te-combo");
            let langBtn = document.getElementById('langBtn');
            
            if (selectField) {
                if (!isBangla) {
                    selectField.value = "bn";
                    selectField.dispatchEvent(new Event("change"));
                    langBtn.innerText = "BN";
                    isBangla = true;
                } else {
                    selectField.value = "en";
                    selectField.dispatchEvent(new Event("change"));
                    langBtn.innerText = "EN";
                    isBangla = false;
                }
            } else {
                console.log("Google Translate is still loading...");
            }
        }

        // YouTube link convert into Embed link
        function getEmbedUrl(url) {
            if (!url) return '';
            if (url.includes('youtube.com/watch?v=')) {
                let id = url.split('v=')[1];
                let ampersandPosition = id.indexOf('&');
                if (ampersandPosition != -1) id = id.substring(0, ampersandPosition);
                return `https://www.youtube.com/embed/${id}`;
            } else if (url.includes('youtu.be/')) {
                let id = url.split('youtu.be/')[1];
                let queryPosition = id.indexOf('?');
                if (queryPosition != -1) id = id.substring(0, queryPosition);
                return `https://www.youtube.com/embed/${id}`;
            }
            return url; 
        }

        async function loadBlogData() {
            try {
                const res = await fetch(BLOG_SHEET_API);
                if(res.ok) {
                    blogPosts = await res.json();
                } else {
                    throw new Error('API failed');
                }
            } catch(e) {
                console.log('Using fallback blog data due to API error');
                blogPosts = getFallbackBlogs();
            }

            blogCategories = new Set(blogPosts.map(post => post.category).filter(c => c));
            renderFilters();
            renderBlog(blogPosts);
        }

        function renderFilters() {
            const filterBar = document.getElementById('blogFilter');
            filterBar.innerHTML = `<button class="filter-btn active" onclick="filterBlog('all')">All Videos & Posts</button>`;
            blogCategories.forEach(cat => {
                filterBar.innerHTML += `<button class="filter-btn" onclick="filterBlog('${cat}')">${cat}</button>`;
            });
        }

        function renderBlog(posts) {
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = '';
            
            if(posts.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--text-muted)">No posts or videos found.</div>';
                return;
            }

            posts.forEach((post, i) => {
                const icons = ['📘','▶️','⚔️','🎬','🎨','🧠'];
                let mediaHtml = '';

                if (post.video_link && post.video_link.trim() !== '') {
                    const embedUrl = getEmbedUrl(post.video_link);
                    mediaHtml = `
                        <div class="video-container">
                            <iframe src="${embedUrl}" allowfullscreen loading="lazy"></iframe>
                        </div>
                    `;
                } else {
                    mediaHtml = `
                        <div class="blog-img" style="position:relative; height:200px; display:flex; align-items:center; justify-content:center; background:var(--bg-secondary); border-radius:var(--radius) var(--radius) 0 0;">
                            <span style="font-size:60px;opacity:0.3">${icons[i % icons.length]}</span>
                        </div>
                    `;
                }

                const card = `
                    <div class="blog-card">
                        ${mediaHtml}
                        <div class="blog-content">
                            <span class="blog-category">${post.category || 'Updates'}</span>
                            <h3>${post.title}</h3>
                            <p>${post.excerpt}</p>
                            <div class="blog-meta">
                                <span><i class="far fa-calendar"></i> ${post.date || 'Recent'}</span>
                                ${post.video_link ? `<a href="${post.video_link}" target="_blank" class="read-more"><i class="fab fa-youtube"></i> Watch on YouTube</a>` : `<a href="#" class="read-more">Read more <i class="fas fa-arrow-right"></i></a>`}
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function filterBlog(category) {
            document.querySelectorAll('#blogFilter .filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (category === 'all') renderBlog(blogPosts);
            else renderBlog(blogPosts.filter(p => p.category === category));
        }

        function getFallbackBlogs() {
            return [
                {
                    category: "Tutorial",
                    title: "How to activate Canva Pro properly",
                    excerpt: "A step-by-step video guide on joining our Canva Pro team and using premium features.",
                    date: "Apr 05, 2026",
                    video_link: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
                },
                {
                    category: "Software Tips",
                    title: "Adobe CC 2026 New Features",
                    excerpt: "Checkout the latest AI tools introduced in the new Adobe Creative Cloud update.",
                    date: "Apr 02, 2026",
                    video_link: "" 
                }
            ];
        }

        document.addEventListener('DOMContentLoaded', loadBlogData);
    </script>
</body>
</html>
