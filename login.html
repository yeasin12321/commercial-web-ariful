<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up — Jinis Kini</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <svg width="180" height="45" viewBox="0 0 180 45" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="180" height="45" rx="8" fill="url(#logo-grad)"/>
                    <text x="16" y="30" font-family="Inter" font-weight="800" font-size="20" fill="white">Jinis Kini</text>
                    <text x="116" y="16" font-family="Inter" font-weight="600" font-size="7" fill="#a78bfa">PREMIUM</text>
                    <text x="116" y="30" font-family="Inter" font-weight="400" font-size="9" fill="#94a3b8">SUBSCRIPTIONS</text>
                    <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient></defs>
                </svg>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="blog.html">Blog</a>
                <a href="support.html">Help & Support</a>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
                <button class="lang-toggle">EN</button>
                <a href="login.html" class="btn-login"><i class="fas fa-user"></i> Login</a>
                <div class="hamburger" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></div>
            </div>
        </div>
    </nav>

    <section style="padding:120px 0 60px">
        <div class="container">
            <div class="auth-container">
                <div class="auth-box">
                    <h2 id="authTitle">Welcome back</h2>
                    <p class="auth-subtitle" id="authSubtitle">Sign in to your Jinis Kini account</p>

                    <button class="btn-google" id="googleBtn">
                        <i class="fab fa-google"></i> Continue with Google
                    </button>

                    <div class="auth-divider">or</div>

                    <!-- Email/Password Form -->
                    <form id="authForm">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                        <div class="form-options" id="forgotPasswordDiv">
                            <a href="#">Forgot?</a>
                        </div>
                        <button type="submit" class="btn-submit" id="submitBtn">Sign in</button>
                    </form>

                    <div class="auth-footer">
                        <span id="footerText">New to Jinis Kini?</span> <a href="#" id="toggleModeBtn">Create account</a>
                    </div>
                    <div class="secure-badge">
                        <i class="fas fa-lock"></i> Encrypted & secure sign-in
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- UI Scripts -->
    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.querySelector('.theme-toggle i').classList.toggle('fa-moon');
            document.querySelector('.theme-toggle i').classList.toggle('fa-sun');
        }
        function toggleMobileMenu() {
            document.querySelector('.nav-links').classList.toggle('open');
            document.querySelector('.nav-right').classList.toggle('open');
        }
    </script>

    <!-- Firebase Authentication Script -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      
        // আপনার Firebase Console থেকে কপি করা Config এখানে বসান
        const firebaseConfig = {
          apiKey: "YOUR_API_KEY",
          authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
          projectId: "YOUR_PROJECT_ID",
          storageBucket: "YOUR_PROJECT_ID.appspot.com",
          messagingSenderId: "YOUR_MESSAGING_ID",
          appId: "YOUR_APP_ID"
        };
      
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
      
        // UI Elements
        const authForm = document.getElementById('authForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const authTitle = document.getElementById('authTitle');
        const authSubtitle = document.getElementById('authSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const forgotPasswordDiv = document.getElementById('forgotPasswordDiv');
        const footerText = document.getElementById('footerText');
        const toggleModeBtn = document.getElementById('toggleModeBtn');
        const googleBtn = document.getElementById('googleBtn');

        // State Variable
        let isLoginMode = true;

        // Toggle Login / Sign Up Mode
        toggleModeBtn.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;
            
            if (isLoginMode) {
                authTitle.innerText = "Welcome back";
                authSubtitle.innerText = "Sign in to your Jinis Kini account";
                submitBtn.innerText = "Sign in";
                forgotPasswordDiv.style.display = "flex";
                footerText.innerText = "New to Jinis Kini?";
                toggleModeBtn.innerText = "Create account";
            } else {
                authTitle.innerText = "Create an account";
                authSubtitle.innerText = "Join Jinis Kini today";
                submitBtn.innerText = "Sign up";
                forgotPasswordDiv.style.display = "none";
                footerText.innerText = "Already have an account?";
                toggleModeBtn.innerText = "Sign in";
            }
        });

        // Handle Email/Password Form Submit
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = emailInput.value;
            const password = passwordInput.value;

            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            if (isLoginMode) {
                // Login Logic
                signInWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        console.log("Logged in successfully!", userCredential.user);
                        window.location.href = "dashboard.html";
                    })
                    .catch((error) => {
                        alert("Login Error: " + error.message);
                        submitBtn.innerText = "Sign in";
                        submitBtn.disabled = false;
                    });
            } else {
                // Sign Up Logic
                createUserWithEmailAndPassword(auth, email, password)
                    .then((userCredential) => {
                        console.log("Account created successfully!", userCredential.user);
                        window.location.href = "dashboard.html";
                    })
                    .catch((error) => {
                        alert("Sign Up Error: " + error.message);
                        submitBtn.innerText = "Sign up";
                        submitBtn.disabled = false;
                    });
            }
        });

        // Google Login
        googleBtn.addEventListener('click', (e) => {
            e.preventDefault(); 
            signInWithPopup(auth, provider)
                .then((result) => {
                    console.log("Google Login Successful!", result.user);
                    window.location.href = "dashboard.html";
                }).catch((error) => {
                    console.error("Login Error:", error.message);
                    alert("Google Login Error: " + error.message);
                });
        });
    </script>
</body>
</html>
