<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — YourBrand</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <svg width="180" height="45" viewBox="0 0 180 45" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="180" height="45" rx="8" fill="url(#logo-grad)"/>
                    <text x="16" y="30" font-family="Inter" font-weight="800" font-size="20" fill="white">YourBrand</text>
                    <text x="116" y="16" font-family="Inter" font-weight="600" font-size="7" fill="#a78bfa">PREMIUM</text>
                    <text x="116" y="30" font-family="Inter" font-weight="400" font-size="9" fill="#94a3b8">SUBSCRIPTIONS</text>
                    <defs><linearGradient id="logo-grad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient></defs>
                </svg>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="blog.html">Blog</a>
                <a href="support.html">Help & Support</a>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
                <button class="lang-toggle">EN</button>
                <a href="login.html" class="btn-login"><i class="fas fa-user"></i> Login</a>
                <div class="hamburger" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></div>
            </div>
        </div>
    </nav>

    <section style="padding:120px 0 60px">
        <div class="container">
            <div class="auth-container">
                <div class="auth-box">
                    <h2>Welcome back</h2>
                    <p class="auth-subtitle">Sign in to your YourBrand account</p>

                    <button class="btn-google">
                        <i class="fab fa-google"></i> Continue with Google
                    </button>

                    <div class="auth-divider">or</div>

                    <form onsubmit="event.preventDefault();alert('Demo: Login would work with backend. Edit this form to connect your authentication system.');">
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                        </div>
                        <div class="form-options">
                            <a href="#">Forgot?</a>
                        </div>
                        <button type="submit" class="btn-submit">Sign in</button>
                    </form>

                    <div class="auth-footer">
                        New to YourBrand? <a href="#">Create account</a>
                    </div>
                    <div class="secure-badge">
                        <i class="fas fa-lock"></i> Encrypted & secure sign-in
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.querySelector('.theme-toggle i').classList.toggle('fa-moon');
            document.querySelector('.theme-toggle i').classList.toggle('fa-sun');
        }
        function toggleMobileMenu() {
            document.querySelector('.nav-links').classList.toggle('open');
            document.querySelector('.nav-right').classList.toggle('open');
        }
    </script>
</body>
</html>
